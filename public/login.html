<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — chattoweb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .back-link {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .back-link:hover { color: #0f172a; }

    .login-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
    }

    .wordmark {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.03em;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 32px;
    }

    .wordmark span { color: #1e40af; }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 0.8125rem;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      line-height: 1.4;
    }

    .error-banner.visible { display: block; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #0f172a;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    input:focus {
      border-color: #1e40af;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.08);
    }

    input::placeholder { color: #94a3b8; }

    .submit-btn {
      width: 100%;
      background: #1e40af;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.1s;
    }

    .submit-btn:hover {
      background: #1d3a8a;
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: none; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <a href="/" class="back-link">← Back to home</a>

  <div class="login-card">
    <a href="/" class="wordmark">chatto<span>web</span></a>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access the demo platform.</p>

    <div class="error-banner" id="error-banner">
      Incorrect username or password. Please try again.
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn">Sign in →</button>
    </form>

    <p class="footer-note">This platform is for authorised clients only.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'config') {
      const b = document.getElementById('error-banner');
      b.textContent = 'Server configuration error: DEMO_PASSWORD is not set.';
      b.classList.add('visible');
    } else if (params.get('error')) {
      document.getElementById('error-banner').classList.add('visible');
    }
  </script>

</body>
</html>
