<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — chatoweb.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0d14;
      --card: #111520;
      --border: #1e2438;
      --accent: #4f8ef7;
      --text: #e2e8f0;
      --text-muted: #6b7a99;
      --white: #ffffff;
      --red: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .back-link {
      position: absolute;
      top: 24px; left: 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: var(--white);
    }
    .logo-text { font-size: 18px; font-weight: 700; color: var(--white); }
    .logo-text span { color: var(--accent); }

    h1 { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .error-banner.visible { display: block; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); background: rgba(79,142,247,0.04); }
    input::placeholder { color: var(--text-muted); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <a href="/" class="back-link">← Back</a>

  <div class="login-box">
    <div class="logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">chato<span>web</span>.com</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access the demo platform.</p>

    <div class="error-banner" id="error-banner">
      Incorrect username or password. Please try again.
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn">Sign in →</button>
    </form>

    <p class="footer-note">This platform is for authorised clients only.</p>
  </div>

  <script>
    // Show error banner if ?error= is in the URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('error-banner').classList.add('visible');
    }
    if (params.get('error') === 'config') {
      document.getElementById('error-banner').textContent = 'Server configuration error: DEMO_PASSWORD is not set in environment variables.';
      document.getElementById('error-banner').classList.add('visible');
    }
  </script>
</body>
</html>
